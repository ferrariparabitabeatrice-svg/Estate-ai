<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Real Estate Investment Analyzer - AI-powered property analysis with Idealista search, archive system, and 10-year projections">
    <meta name="theme-color" content="#0f1419">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Estate AI">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230f1419' width='192' height='192'/%3E%3Ctext x='50%' y='50%' font-size='100' fill='%23fbbf24' text-anchor='middle' dominant-baseline='middle' font-family='Arial, sans-serif' font-weight='bold'%3E🏠%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230f1419' width='180' height='180' rx='45'/%3E%3Ctext x='50%' y='50%' font-size='90' fill='%23fbbf24' text-anchor='middle' dominant-baseline='middle' font-family='Arial, sans-serif' font-weight='bold'%3E🏠%3C/text%3E%3C/svg%3E">
    
    <title>Estate AI - Real Estate Investment Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #151b28 100%);
            color: white;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
        }
        
        input, select, button {
            font-family: inherit;
        }
        
        /* Mobile Safe Areas */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // Register Service Worker for offline functionality
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
        
        // Handle install prompt
        let installPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPrompt = e;
        });
        
        window.addEventListener('appinstalled', () => {
            installPrompt = null;
            console.log('App installed');
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
